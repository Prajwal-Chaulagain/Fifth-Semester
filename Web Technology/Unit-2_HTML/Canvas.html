<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas</title>
</head>
<body>
    <canvas id="MyCanvas" width="800" style="border:1px solid red; background-color: antiquewhite;">

    </canvas>
</body>
<script>
        var c = document.getElementById("MyCanvas");
        var ctx = c.getContext("2d");

        ctx.moveTo(0,0);
        ctx.lineTo(500, 700);
        ctx.stroke();

        // ctx.beginPath();
        // ctx.arc(400, 400, 50, 0, 2 * Math.PI);
        // // (400, 400) - center
        // // 50 - radius
        // // 0 - starting angle
        // // 2 * Math.PI - ending angle
        ctx.stroke();
</script>
</html>
