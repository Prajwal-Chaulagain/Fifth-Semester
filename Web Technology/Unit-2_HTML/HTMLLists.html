<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>:HTML Lists</title>
</head>
<body>
    <ul type="circle">
        <!-- Unordered list -->
         <li>This is list 1</li>
         <li>This is list 2</li>
    </ul>
    <ul type="circle">
        <li>Tea</li>
    <ol>
        <li>Black tea</li>
        <li>White tea</li>
    </ol>
    </ul>
    <ol type="2" start="1">
        <!-- Ordered list -->
         <li>This is list 1</li>
         <li>This is list 2</li>
    </ol>
</body>
</html>
