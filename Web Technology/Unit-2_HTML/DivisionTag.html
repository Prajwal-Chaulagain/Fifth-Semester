<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Division Tag</title>
</head>
<style>
div{
    background-color: aquamarine;
}
#div1{
    background-color: aqua;
    width: 50%;
    display: inline;
}
.div2{
    background-color: blue;
    width: 50%;
    display: inline;
}
</style>
<body>
    <div>This is a normal division tag</div>
    <div id="div1">This is div1</div>
    <div class="div2">This is div2</div>
    <p>x<sub>1</sub><sup>2</sup>+y<sub>1</sub><sup>2</sup>=R<sup>2</sup></p>
    
</body>
</html>
