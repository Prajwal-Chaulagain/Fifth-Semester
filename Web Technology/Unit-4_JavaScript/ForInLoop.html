<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For In Loop</title>
</head>
<body>
    <script>
        var students = { name:"Prajwal", address: "Thasikhel", Age: 22};
        for(st in students) {
        document.write(students[st] + "<br>");
    }
    </script>
</body>
</html>
