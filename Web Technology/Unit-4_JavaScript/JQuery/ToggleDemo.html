<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle Demo</title>
    <script src="JQuery.js"></script>
</head>
<body>
    <p>I will be toggled.</p>
    <script>
        $(document).ready(function(){
            $("p").toggle(1000, function(){ //callback function, 2000 milliseconds
                //alert("Complete toggling");
                $(this).show(2000);
            });
        });
    </script>
</body>
</html>
