<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Event Handler</title>
    <script src="JQuery.js"></script>
</head>
<body>
    <p>I have Multiple event Handler. Touch and leave and click</p>
    <script>
        $("p").on({
            mouseenter: function(){
                $(this).css("background","lightgray");
            },
            mouseleave: function(){
                $(this).css("background","lightblue");
            },
            click: function(){
                $(this).css("background","yellow");
            }
        });
    </script>
</body>
</html>
