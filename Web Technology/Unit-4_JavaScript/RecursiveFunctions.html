<!-- Write a program to find the factorial, gcd, toh, fibonacci using recursive function, create different user defined functions for the operations-->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursive Function</title>
 </head>
 <body>
    <script>
        var n = prompt("Enter: 1. Factorial 2. GCD 3. TOH 4. Fibonacci", "1");
        switch (n) {
            case "1":
                var num = Number(prompt("Enter a number:", "0"));
                alert("Factorial of " + num + " is " + factorial(num));
                break;
            case "2":
                var a = Number(prompt("Enter first number:", "0"));
                var b = Number(prompt("Enter second number:", "0"));
                alert("GCD of " + a + " and " + b + " is " + gcd(a, b));
                break;
            case "3":
                var n = Number(prompt("Enter number of disks:", "0"));
                toh(n, "A", "C", "B");
                break;
            case "4":
                var num = Number(prompt("Enter a number:", "0"));
                alert("Fibonacci of " + num + " is " + fibonacci(num));
                break;
            default:
                alert("Invalid input.");
        }

        function factorial(n) {
            if (n == 0 || n == 1)
                return 1;
            else
                return n * factorial(n - 1);
        }

        function gcd(a, b) {
            if (b == 0)
                return a;
            else
                return gcd(b, a % b);
        }

        function toh(n, from, to, aux) {
            if (n == 1)
                document.write("Move disk 1 from " + from + " to " + to + "<br>");
            else {
                toh(n - 1, from, aux, to);
                document.write("Move disk " + n + " from " + from + " to " + to + "<br>");
                toh(n - 1, aux, to, from);
            }
        }

        function fibonacci(n) {
            if (n == 0)
                return 0;
            else if (n == 1)
                return 1;
            else
                return fibonacci(n - 1) + fibonacci(n - 2);
        }

    </script>
 </body>
 </html>
