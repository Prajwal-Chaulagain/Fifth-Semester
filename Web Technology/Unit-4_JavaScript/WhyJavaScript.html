<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <div id="testid">
      <button onclick="newElement()">Add More Buttons +</button>
    </div>

    <script>
      function newElement() {
        var child = document.createElement("button");
        child.innerHTML("New Button");
        var parent = document.getElementById("testid");
        parent.appendChild(child);
      }
    </script>
  </body>
</html>
