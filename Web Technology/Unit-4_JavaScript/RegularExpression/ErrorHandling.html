<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Handling</title>
</head>
<body>
    <button onclick="callme()">Click Me</button>
    <script>
        function callme(){
            try{
                alert("This is error");  //Error
            }
            catch(err){
                document.writeln("The error is=" + err);
            }
            finally{
                var date = new Date();
                document.writeln("Time is " + date.getFullYear() + ":" + date.getHours() + ":" + date.getMinutes() + ":" + date.getSeconds() + ":");
            }
        }
    </script>
</body>
</html>
