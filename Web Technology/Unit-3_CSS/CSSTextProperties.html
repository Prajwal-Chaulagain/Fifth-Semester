<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Text Properties</title>
  </head>
  <body>
    <style>
      p.test1 {
        white-space: nowrap;
        width: 200px;
        border: 1px solid #000000;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      p.test1:hover {
        white-space: wrap;
        width: 200px;
        border: 1px solid #000000;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
    <p class="test1">I am Prajwal Chaulagain. I live in Thasikhel, lalitpur.</p>
    <span><button>Read More</button></span>
  </body>
</html>
