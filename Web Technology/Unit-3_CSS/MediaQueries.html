<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries</title>
</head>
<style>
    @media only screen and (max-width:600px) {
        body {
            background-color: red;
            font-size: 20px;

        }
        
    }
    p{
        font-size: 30px;
    }
</style>
<body>
    <p>The color will be changed if you resize the window.</p>
</body>
</html>
