<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
</head>
<style>
    p, h3, h2 {
        background-color: red;
        
    }
    h3 {
        position: relative;
        left: 30px;
        float: left;
    }
    h2 {
        position: absolute;
        left: 30px;
        visibility: hidden;
        /* display: none; */
    }
</style>
<body>
    <p>This is defalt p tag</p>
    <h3>This is h3 tag with relative position</h3>
    <h2>This ia h2 tag with absolute tag</h2>
</body>
</html>
