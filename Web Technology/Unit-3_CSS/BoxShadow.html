<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Shadow</title>
</head>
<style>
    div {
        border: 10px solid green;
        box-shadow: 0 0 22px 7px red;
        font-size: 100px;
    }
    h1{

        font-size: 200px;
        color: black;
        text-shadow: 10px 10px 20px blue;
    }
</style>
<body>
    <div>
        This is a div tag.
    </div>
    <h1>
        PRAJWAL CHAULAGAIN
    </h1>
</body>
</html>
