<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
</head>
<!-- 1. Inline css- style attributes is used to change the style of current tag.-->
<!-- 2. Internal or embedded css- style tag is used to change the css in current page.-->
<!-- 3. External css- .css file has css code to change the css properties in many html pages or documents.-->
<body>
    <h2 style="color: blue; text-align: center; text-decoration: line-through; font-size: 30px;">
        This is h2 tag
    </h2>
    <h2> I am another h2 tag</h2>
    <p>This is a paragraph</p>
    <style>
        h2{
            background-color: red;
            color: blue;
            text-align: center;
            text-decoration: line-through;
        }
    </style>
</body>
    <link rel="stylesheet" href="Style.css">

</html>
