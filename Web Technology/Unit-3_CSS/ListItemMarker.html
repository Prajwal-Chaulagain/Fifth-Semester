<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Item Marker</title>
    <style>
        ul{
            list-style-image: url("/Web_Technology/Photos/Pentip.png");
        }
        li{
            background-color: blue;
        }
        .a{
            list-style-position: inside;
        }
        .b{
            list-style-position: outside;
        }
    </style>
</head>
<body>
    <ul class="a">
        <li>I am Parjwal</li>
        <li>I am Prajwal</li>
        <li>I am Prajwal</li>
        <li>I am Prajwal</li>
    </ul>
    <ul class="b">
        <li>I am Parjwal</li>
        <li>I am Prajwal</li>
        <li>I am Prajwal</li>
        <li>I am Prajwal</li>
    </ul>
</body>
</html>
