<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table CSS Design</title>
    <style>
        table{
            border-collapse: collapse;
        }
        tr:hover{
            background-color: red;
        }
        tr:nth-child(even){
            background-color: blueviolet;
        }
    </style>
</head>
<body>
    <table border="2px">

        <th>Name</th>
        <th>College</th>
        <tr>
            <td>Prajwal</td>
            <td>Vedas</td>
        </tr>
        <tr>
            <td>Anil</td>
            <td>Vedas</td>
        </tr>
        <tr>
            <td>Luv</td>
            <td>Vedas</td>
        </tr>
         <tr>
            <td>Roman</td>
            <td>Vedas</td>
        </tr>
    </table>
</body>
</html>
