<!-- Write supported HTML document for implementing inline, internal and external CSS.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>CSS Implementation Example</title>

    <link rel="stylesheet" href="Style.css">

    <style>
        body {
            text-align: center;
        }

        .internal-style {
            color: green;
            font-size: 22px;
            border: 2px solid green;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Name: Prajwal Chaulagain</h1>
    <h1>Symbol No.: 80010773</h1>

    <h1>Types of CSS in HTML</h1>

    <p style="color: red; font-size: 18px; border: 2px solid red; padding: 10px;">
        This paragraph uses Inline CSS.
    </p>

    <p class="internal-style">
        This paragraph uses Internal CSS.
    </p>

    <p class="external-style">
        This paragraph uses External CSS.
    </p>

</body>
</html>
