<!-- Write a CSS code for accessing the tags using tag, id and class names and change the font-size and color of the text inside the tags.-->
<!DOCTYPE html>
<html>

<head>
    <title>CSS Selectors Example</title>
    <link rel="stylesheet" href="Style.css">
    <style>
        /* Tag Selector */
        h1 {
            font-size: 30px;
            color: black;
        }

        /* ID Selector */
        #myId {
            font-size: 22px;
            color: red;
        }

        /* Class Selector */
        .class1 {
            font-size: 18px;
            color: green;
        }
    </style>
</head>

<body>
    <h1>Name: Prajwal Chaulagain</h1>
    <h1>Symbol No.: 80010773</h1>

    <!-- Tag Selector -->
    <h1>This is a Heading</h1>

    <!-- ID Selector -->
    <p id="myId">This is a Paragraph</p>

    <!-- Class Selector -->
    <p class="class1">This is Paragraph 1</p>
    <p class="class1">This is Paragraph 2</p>

</body>

</html>
