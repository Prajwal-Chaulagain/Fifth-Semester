<!-- Write CSS for differentiating padding and margin concepts.-->
 <!DOCTYPE html>
<html>

<head>
    <title>Padding vs Margin</title>
    <style>
        /* Page background to visualize margin space */
        body {
            background-color: #f2f2f2;
        }

        /* Outer box demonstrating MARGIN */
        .margin-box {
            background-color: lightblue;
            margin: 50px;
            /* Space OUTSIDE the border */
            border: 3px solid blue;
        }

        /* Inner box demonstrating PADDING */
        .padding-box {
            background-color: lightcoral;
            padding: 30px;
            /* Space INSIDE the border */
            border: 10px solid red;
            color: white;
            font-size: 20px;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>Name: Prajwal Chaulagain</h1>
    <h1>Symbol No.: 80010773</h1>
    <div class="margin-box">
        <div class="padding-box">
            Content Area
        </div>
    </div>

</body>

</html>
