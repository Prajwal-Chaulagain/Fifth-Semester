<!--Write a CSS to fit the background image in body tag with no-repeat.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Background Image Example</title>
    <style>
        body {
            background-image: url('/Photos/Flower.jpg'); /* Set the background image */
            background-size: cover; /* Make the background cover the entire page */
            background-position: center; /* Center the background image */
            background-repeat: no-repeat; /* Prevent the background from repeating */
            height: 50vh; /* Set the height to fill the viewport */
            margin: 0; /* Remove default margin */
        }
    </style>
</head>
<body>
    <h1>Name: Prajwal Chaulagain</h1>
    <h1>Symbol No.: 80010773</h1>
</body>
</html>
