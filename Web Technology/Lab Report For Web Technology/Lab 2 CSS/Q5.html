<!-- Write a CSS code for CSS3 borders, Box shadows, Text Effects and Shadow in a single stylesheet.-->
<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS3 Borders, Shadows and Text Effects</title>
    <style>
        /* General Page Styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 40px;
        }

        /* CSS3 Borders */
        .border-box {
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            border: 5px solid #3498db;
            /* Solid Border */
            border-radius: 20px;
            /* Rounded Corners */
            background-color: white;
        }

        /* Box Shadow */
        .shadow-box {
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.3);
            /* Box Shadow */
        }

        /* Text Effects */
        .text-effects {
            font-size: 24px;
            color: #2c3e50;
            letter-spacing: 3px;
            /* Space between letters */
            word-spacing: 8px;
            /* Space between words */
            text-transform: uppercase;
            /* Convert text to uppercase */
        }

        /* Text Shadow */
        .text-shadow {
            font-size: 30px;
            color: #e74c3c;
            text-shadow: 3px 3px 6px gray;
            /* Horizontal, Vertical, Blur, Color */
        }
    </style>
</head>

<body>
    <h1>Name: Prajwal Chaulagain</h1>
    <h1>Symbol No.: 80010773</h1>
    
    <h1 class="text-shadow">CSS3 Text Shadow Example</h1>

    <div class="border-box">
        <p>This box demonstrates CSS3 rounded borders.</p>
    </div>

    <div class="shadow-box">
        <p>This box demonstrates the box-shadow property.</p>
    </div>

    <p class="text-effects">
        This text shows letter spacing, word spacing and uppercase transformation.
    </p>

</body>

</html>
