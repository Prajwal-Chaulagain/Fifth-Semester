<!-- Write a HTML document that contains the b, i, small, sup, sub, Pre, Br, span, strong, tt tags/ elements.-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Text Formatting</title>
  </head>

  <body>
    <h1>Name: Prajwal Chaulagain</h1>
    <h1>Symbol No.: 80010773</h1>
    <b>This is bold text.</b><br />
    <i>This is italic text.</i><br />
    <small>This is small text.</small><br />
    <p>H<sub>2</sub>O + CO<sub>2</sub></p>
    <span>This is a span element.</span><br />
    <strong>This is strong text.</strong><br />
    <tt> This is teletype text. </tt>
  </body>
</html>
