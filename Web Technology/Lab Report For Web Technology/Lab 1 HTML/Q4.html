<!-- Write a HTML document that implements meta, audio, video and canvas tag in single document.-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="description" content="This is a meta tag example">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Tags</title>
</head>

<body>
    <h1>Name: Prajwal Chaulagain</h1>
    <h1>Symbol No.: 80010773</h1>
    <h1>Meta Tags Example</h1>
    <p>This page demonstrates the use of meta tags in HTML.</p>
    <audio src="/Photos/Mayali.mp3" controls></audio>
    <video src="/Photos/Video.mp4" controls height="200" width="300"></video>
    <canvas id="MyCanvas" width="200" height="100"></canvas>
</body>
<script>
    var canvas = document.getElementById("MyCanvas");
    var ctx = canvas.getContext("2d");
    ctx.fillStyle = "blue";
    ctx.fillRect(10, 10, 150, 80);
</script>

</html>
